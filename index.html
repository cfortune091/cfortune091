<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJI Arkansas Training Map — Criminal Justice Institute</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- ADD / EDIT CLASS MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Training Class</div>
      <button class="icon-btn" onclick="closeModal()" title="Close">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">

        <!-- County -->
        <div class="form-group">
          <label class="form-label" for="f-county">County *</label>
          <!-- Options populated by JS init() via COUNTY_NAMES -->
          <select class="form-select" id="f-county">
            <option value="">Select county&hellip;</option>
          </select>
        </div>

        <!-- Department -->
        <div class="form-group">
          <label class="form-label" for="f-department">Department *</label>
          <select class="form-select" id="f-department">
            <option value="">Select department&hellip;</option>
            <option>DEC</option>
            <option>Forensics</option>
            <option>LEMD</option>
            <option>ACSS</option>
            <option>VAWA</option>
          </select>
        </div>

        <!-- Class Title (full width) -->
        <div class="form-group full">
          <label class="form-label" for="f-classTitle">Class Title *</label>
          <input class="form-input" type="text" id="f-classTitle" placeholder="e.g. Evidence-Based Policing">
        </div>

        <!-- Status -->
        <div class="form-group">
          <label class="form-label" for="f-status">Status *</label>
          <select class="form-select" id="f-status">
            <option value="">Select status&hellip;</option>
            <option>Scheduled</option>
            <option>In Progress</option>
            <option>Completed</option>
            <option>Cancelled</option>
          </select>
        </div>

        <!-- Instructor -->
        <div class="form-group">
          <label class="form-label" for="f-instructor">Instructor</label>
          <input class="form-input" type="text" id="f-instructor" placeholder="Last, First">
        </div>

        <!-- Start Date -->
        <div class="form-group">
          <label class="form-label" for="f-startDate">Start Date</label>
          <input class="form-input" type="date" id="f-startDate">
        </div>

        <!-- End Date -->
        <div class="form-group">
          <label class="form-label" for="f-endDate">End Date</label>
          <input class="form-input" type="date" id="f-endDate">
        </div>

        <!-- Venue (full width) -->
        <div class="form-group full">
          <label class="form-label" for="f-venue">Venue / Location</label>
          <input class="form-input" type="text" id="f-venue" placeholder="Building name or address">
        </div>

        <!-- Enrollment -->
        <div class="form-group">
          <label class="form-label" for="f-enrollment">Enrollment</label>
          <input class="form-input" type="number" id="f-enrollment" min="0" placeholder="0">
        </div>

        <!-- Max Seats -->
        <div class="form-group">
          <label class="form-label" for="f-maxSeats">Max Seats</label>
          <input class="form-input" type="number" id="f-maxSeats" min="0" placeholder="0">
        </div>

        <!-- Notes (full width) -->
        <div class="form-group full">
          <label class="form-label" for="f-notes">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Any additional notes&hellip;"></textarea>
        </div>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitModal()">Save Class</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">CJI</div>
    <div>
      <div class="header-title">Arkansas Training Map</div>
      <div class="header-sub">Criminal Justice Institute &middot; University of Arkansas System</div>
    </div>
  </div>
  <div class="header-actions">
    <!-- Hidden file input for xlsx import -->
    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
    <button class="btn btn-sm" onclick="document.getElementById('file-input').click()" title="Import from Excel">
      &#128194; Load Spreadsheet
    </button>
    <button class="btn btn-sm btn-gold" onclick="openAddModal()">&#xFF0B; Add Class</button>
    <button class="btn btn-sm" onclick="exportToExcel()" title="Export all data to Excel">&#8595; Export</button>
    <button class="btn btn-sm" onclick="downloadTemplate()" title="Download blank import template">&#128203; Template</button>
    <button class="btn btn-sm" onclick="triggerPrint()" title="Print or save as PDF">&#128424; Print</button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">Dept</span>
    <div id="dept-pills" style="display:flex;gap:4px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Status</span>
    <div id="status-pills" style="display:flex;gap:4px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Year</span>
    <div id="year-pills" style="display:flex;gap:4px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-divider"></div>
  <button class="clear-filters" id="clear-filters-btn" onclick="clearFilters()">&#x2715; Clear all</button>

  <!-- Print-only filter summary (hidden on screen) -->
  <div class="print-only" id="print-filter-summary" style="font-size:12px;color:#6B7280"></div>
</div>

<!-- APP BODY -->
<div class="app-body">

  <!-- MAP -->
  <div class="map-container" id="map-container">
    <svg id="map"></svg>
    <!-- Print watermark (hidden on screen) -->
    <div class="print-only" style="position:absolute;bottom:8px;left:12px;font-size:10px;color:#1B3A6B;opacity:0.7">
      CJI Arkansas Training Map &middot; Printed <span id="print-date"></span>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <aside class="side-panel">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="classes">Classes</button>
      <button class="tab-btn" data-tab="gaps">Gaps</button>
    </div>
    <div class="tab-content">
      <div class="tab-pane active" id="tab-overview"></div>
      <div class="tab-pane"        id="tab-classes"></div>
      <div class="tab-pane"        id="tab-gaps"></div>
    </div>
  </aside>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="map.js"></script>
</body>
</html>
